<body class="font-sans text-slate-800 bg-blue-50 min-h-screen flex items-center justify-center p-0 sm:p-4">
    
    <!-- 메인 앱 컨테이너 -->
    <div id="app" class="w-full h-full sm:h-[800px] sm:w-[420px] sm:rounded-3xl overflow-hidden shadow-2xl shadow-blue-900/20 bg-white relative flex flex-col border border-blue-100">
    <div class="flex-1 overflow-y-auto pb-24 custom-scrollbar flex flex-col h-full">
        <div class="text-center mb-4 pt-10 px-5 shrink-0">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-100 text-blue-600 mb-4 shadow-inner">
                <i class="fa-solid fa-book-open text-3xl"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-800 mb-1">
                단어 암기 마스터
            </h1>
            <p class="text-blue-600 font-medium">EBS 수능특강 영어독해연습 (9~10강)</p>
            
            <button onclick="downloadApp()" class="mt-5 text-sm bg-slate-800 hover:bg-slate-700 text-white py-2.5 px-6 rounded-full font-bold transition-transform transform active:scale-95 inline-flex items-center gap-2 shadow-md">
                <i class="fa-solid fa-download"></i> 이 앱을 파일로 다운로드
            </button>
        </div>

        
        <div class="bg-blue-50 border border-blue-200 rounded-2xl shadow-sm p-6 mb-6 mx-5 mt-4">

                <i class="fa-solid fa-clock-rotate-left"></i> 학습 이어서 하기

            <p class="text-sm text-blue-600 mb-4 font-medium">

        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 mx-5 border border-slate-100 shrink-0">

            <label class="flex items-center text-sm text-slate-600 cursor-pointer hover:text-blue-600 transition-colors">
                <input type="checkbox" checked="" onchange="toggleExercise(9, 'Exercise 2')" class="w-4 h-4 mr-2 rounded border-gray-300 cursor-pointer">

            <label class="flex items-center text-sm text-slate-600 cursor-pointer hover:text-blue-600 transition-colors">
                <input type="checkbox" checked="" onchange="toggleExercise(9, 'Exercise 3')" class="w-4 h-4 mr-2 rounded border-gray-300 cursor-pointer">

// --- 2. 상태 관리 (고유 키 사용) ---
const STORAGE_KEY = 'ebs_vocab_session_blue_v3';

// 강(Chapter)별 구조화
const structure = { 9: [], 10: [] };
WORD_DATA.forEach(w => {
  if (!structure[w.ch].includes(w.ex)) {
    structure[w.ch].push(w.ex);
  }
});

let state = {
    view: 'home', // 'home', 'quiz', 'result'
    savedSession: null,
    selectedChapters: [9, 10],
    selectedExercises: [], // 초기화 시 데이터 주입됨
    quizMode: 'mixed', 
    isRandom: false,
    quizList: [], // 이전 option/userAnswer 정보를 담은 퀴즈 배열
    currentIndex: 0
};

let autoAdvanceTimeout = null;

// 유틸: 배열 랜덤 섞기
const shuffleArray = (array) => {
  const newArray = [...array];
  for (let i = newArray.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
  }
  return newArray;
};

// --- 3. 로컬 스토리지 데이터 로드 ---
function loadSavedSession() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        state.savedSession = JSON.parse(saved);
    } else {
        state.savedSession = null;
    }
}

// --- 4. 액션 핸들러 ---
window.toggleChapter = (chapter) => {
    const isSelected = state.selectedChapters.includes(chapter);
    const chapterExercises = structure[chapter].map(ex => `${chapter}-${ex}`);
    
    if (isSelected) {
        state.selectedChapters = state.selectedChapters.filter(c => c !== chapter);
        state.selectedExercises = state.selectedExercises.filter(ex => !chapterExercises.includes(ex));
    } else {
        state.selectedChapters.push(chapter);
        chapterExercises.forEach(ex => {
            if (!state.selectedExercises.includes(ex)) state.selectedExercises.push(ex);
        });
    }
    render();
};

window.toggleExercise = (chapter, exercise) => {
    const key = `${chapter}-${exercise}`;
    if (state.selectedExercises.includes(key)) {
        state.selectedExercises = state.selectedExercises.filter(k => k !== key);
    } else {
        state.selectedExercises.push(key);
    }
    render();
};

window.setQuizMode = (mode) => {
    state.quizMode = mode;
    render();
};

window.setIsRandom = (bool) => {
    state.isRandom = bool;
    render();
};

// 퀴즈 문제 목록 생성
function prepareQuizData(filteredWords, mode) {
    return filteredWords.map(word => {
        const isEnToKo = mode === 'enToKo' || (mode === 'mixed' && Math.random() > 0.5);
        const correctAnswer = isEnToKo ? word.ko : word.en;
        const questionText = isEnToKo ? word.en : word.ko;
        
        // 오답 3개 추출
        const wrongOptions = WORD_DATA
          .filter(w => w.id !== word.id && (isEnToKo ? w.ko !== correctAnswer : w.en !== correctAnswer))
          .sort(() => 0.5 - Math.random())
          .slice(0, 3)
          .map(w => isEnToKo ? w.ko : w.en);

        const options = shuffleArray([correctAnswer, ...wrongOptions]);
        
        return {
            ...word,
            questionText,
            correctAnswer,
            isEnToKo,
            options,
            userAnswer: null // 초기에는 푼 상태가 아님
        };
    });
}

window.startQuiz = () => {
    if (state.selectedExercises.length === 0) return;

    clearProgressSilent(); // 새로 시작하므로 기존 기록 삭제

    let filteredWords = WORD_DATA.filter(w => state.selectedExercises.includes(`${w.ch}-${w.ex}`));
    if (state.isRandom) filteredWords = shuffleArray(filteredWords);

    state.quizList = prepareQuizData(filteredWords, state.quizMode);
    state.currentIndex = 0;
    state.view = 'quiz';
    
    render();
};

window.resumeQuiz = () => {
    if (!state.savedSession) return;
    
    state.quizList = state.savedSession.quizList;
    state.currentIndex = state.savedSession.currentIndex;
    state.selectedChapters = state.savedSession.selectedChapters;
    state.selectedExercises = state.savedSession.selectedExercises;
    state.quizMode = state.savedSession.quizMode;
    state.isRandom = state.savedSession.isRandom;
    
    state.view = 'quiz';
    render();
};

window.saveProgress = () => {
    const sessionData = {
        quizList: state.quizList,
        currentIndex: state.currentIndex,
        selectedChapters: state.selectedChapters,
        selectedExercises: state.selectedExercises,
        quizMode: state.quizMode,
        isRandom: state.isRandom,
        timestamp: Date.now()
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(sessionData));
    
    // 알림 메시지 띄운 후 홈으로 이동 (기록은 안전하게 저장됨)
    alert('현재 진행 상황이 저장되었습니다!');
    state.view = 'home';
    loadSavedSession();
    render();
};

window.clearProgress = () => {
    if(confirm('정말 저장된 학습 기록을 지우시겠습니까?')) {
        clearProgressSilent();
        render();
    }
};

function clearProgressSilent() {
    localStorage.removeItem(STORAGE_KEY);
    state.savedSession = null;
}

window.goToHome = () => {
    state.view = 'home';
    render();
};

window.downloadApp = () => {
    const htmlContent = '<!DOCTYPE html>\n<html lang="ko">\n' + document.documentElement.innerHTML + '\n</html>';
    const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'EBS_영단어_퀴즈앱_파랑.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
};

// 정답 선택 시
window.selectOption = (optIndex) => {
    const currentWord = state.quizList[state.currentIndex];
    
    // 이미 답을 고른 상태(리뷰 중)라면 무시
    if (currentWord.userAnswer) return; 
    
    currentWord.userAnswer = currentWord.options[optIndex];
    render(); // 즉시 O/X 표시 업데이트

    // 1초 후 자동으로 다음으로 넘어가기
    clearTimeout(autoAdvanceTimeout);
    autoAdvanceTimeout = setTimeout(() => {
        if (state.currentIndex + 1 < state.quizList.length) {
            state.currentIndex++;
            render();
        } else {
            // 마지막 문제라면 자동으로 결과 화면으로 이동하지 않고 기다리게 할 수도 있지만, 
            // 흐름상 결과화면으로 가는 것이 자연스럽습니다.
            window.finishQuiz();
        }
    }, 1000);
};

// 네비게이션
window.prevQuestion = () => {
    clearTimeout(autoAdvanceTimeout);
    if (state.currentIndex > 0) {
        state.currentIndex--;
        render();
    }
};

window.nextQuestion = () => {
    clearTimeout(autoAdvanceTimeout);
    if (state.currentIndex + 1 < state.quizList.length) {
        state.currentIndex++;
        render();
    }
};

window.finishQuiz = () => {
    clearTimeout(autoAdvanceTimeout);
    clearProgressSilent(); // 다 풀었으므로 세션 삭제
    state.view = 'result';
    render();
};

    </div>

    <!-- 하단 고정 버튼 -->
    <div class="p-5 bg-white sm:rounded-b-3xl absolute bottom-0 left-0 right-0 border-t border-slate-100 z-10 shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.05)]">
        <button onclick="startQuiz()" ${startBtnDisabled ? 'disabled' : ''} 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-4 px-6 rounded-2xl shadow-lg shadow-blue-600/30 transition-transform transform active:scale-95 disabled:opacity-50 disabled:active:scale-100 flex items-center justify-center gap-2 text-lg">
            <i class="fa-solid fa-play"></i>
            ${state.selectedExercises.length > 0 ? '새로 시작하기' : '범위를 선택하세요'}
        </button>
    </div>
    `;
}

function getQuizHTML() {
    const currentWord = state.quizList[state.currentIndex];
    if (!currentWord) return '';

    const progress = (state.currentIndex / state.quizList.length) * 100;

    let optionsHTML = currentWord.options.map((option, i) => {
        let btnClass = "w-full p-4 text-left rounded-2xl border-2 transition-all text-lg font-bold ";
        let iconHTML = "";
        let meaningHTML = "";
        
        if (!currentWord.userAnswer) {
            // 아직 아무 답도 고르지 않은 상태
            btnClass += "bg-white border-slate-100 text-slate-700 hover:border-blue-400 hover:bg-blue-50 shadow-sm";
        } else {
            // 리뷰 모드 혹은 정답 선택 직후
            
            // 각 보기의 반대 언어(원래 뜻) 찾기
            let optionMeaning = "";
            const matchedWord = WORD_DATA.find(w => currentWord.isEnToKo ? w.ko === option : w.en === option);
            if (matchedWord) {
                optionMeaning = currentWord.isEnToKo ? matchedWord.en : matchedWord.ko;
                // 기본 뜻 HTML 템플릿 (선택되지 않은 오답용)
                meaningHTML = `<div class="text-sm font-medium mt-1 text-slate-400 break-words whitespace-normal text-left">${optionMeaning}</div>`;
            }

            if (option === currentWord.correctAnswer) {
                btnClass += "bg-green-50 border-green-500 text-green-800 shadow-sm";
                iconHTML = `<i class="fa-solid fa-circle-check text-green-500 text-xl shrink-0"></i>`;
                // 정답 뜻 텍스트 색상 변경
                if(meaningHTML) meaningHTML = `<div class="text-sm font-medium mt-1 text-green-700 opacity-90 break-words whitespace-normal text-left">${optionMeaning}</div>`;
            } else if (option === currentWord.userAnswer) {
                btnClass += "bg-red-50 border-red-500 text-red-800 shadow-sm";
                iconHTML = `<i class="fa-solid fa-circle-xmark text-red-500 text-xl shrink-0"></i>`;
                // 오답 뜻 텍스트 색상 변경
                if(meaningHTML) meaningHTML = `<div class="text-sm font-medium mt-1 text-red-700 opacity-90 break-words whitespace-normal text-left">${optionMeaning}</div>`;
            } else {
                btnClass += "bg-slate-50 border-slate-200 text-slate-400 opacity-80";
            }
        }

        return `
        <button ${currentWord.userAnswer ? 'disabled' : ''} onclick="selectOption(${i})" class="${btnClass}">
            <div class="flex justify-between items-center gap-3">
                <div class="flex-1 flex flex-col items-start">
                    <span class="break-words whitespace-normal text-left">${option}</span>
                    ${meaningHTML}
                </div>
                ${iconHTML}
            </div>
        </button>`;
    }).join('');

    const isLast = state.currentIndex === state.quizList.length - 1;
    const hasAnswered = !!currentWord.userAnswer;

    return `
    <div class="flex-1 flex flex-col p-6 overflow-y-auto bg-slate-50 custom-scrollbar pb-10">
        <!-- 상단 헤더 -->
        <div class="flex items-center justify-between mb-6 shrink-0">
            <button onclick="goToHome()" class="w-10 h-10 flex items-center justify-center text-slate-500 hover:bg-white hover:shadow-sm rounded-full transition-all border border-transparent hover:border-slate-200" title="저장하지 않고 홈으로">
                <i class="fa-solid fa-house"></i>
            </button>
            <div class="flex items-center gap-2">
                <span class="text-sm font-bold text-slate-400 tracking-widest bg-white px-3 py-1 rounded-full shadow-sm border border-slate-100">
                    <span class="text-blue-600">${state.currentIndex + 1}</span> / ${state.quizList.length}
                </span>
            </div>
            <button onclick="saveProgress()" 
                    class="flex items-center gap-1.5 px-3 py-2 bg-blue-100 hover:bg-blue-200 text-blue-800 rounded-xl text-sm font-bold transition-colors" title="현재 진행 상황 저장하기">
                <i class="fa-solid fa-floppy-disk"></i> 저장
            </button>
        </div>
        
        <div class="w-full bg-slate-200 rounded-full h-2 mb-8 overflow-hidden shrink-0">
            <div class="bg-blue-500 h-2 rounded-full transition-all duration-300 ease-out" style="width: ${progress}%"></div>
        </div>

        <div class="flex-1 flex flex-col justify-center mb-2 shrink-0">
            <div class="text-center mb-8 relative">
                <span class="absolute -top-6 left-1/2 -translate-x-1/2 inline-block px-3 py-1 bg-blue-600 text-white rounded-full text-xs font-bold shadow-sm whitespace-nowrap">
                    ${currentWord.ch}강 - ${currentWord.ex.replace('Exercise ', 'Ex ')}
                </span>
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 mt-2 relative">
                    ${hasAnswered ? `<span class="absolute top-3 right-4 text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded-md border border-slate-200"><i class="fa-solid fa-eye text-blue-500"></i> 리뷰 중</span>` : ''}
                    <h2 class="text-3xl sm:text-4xl font-extrabold text-slate-800 break-words leading-tight mt-2">
                        ${currentWord.questionText}
                    </h2>
                </div>
            </div>

            <div class="space-y-3">
                ${optionsHTML}
            </div>
        </div>

        <!-- 네비게이션 버튼 -->
        <div class="flex justify-between items-center mt-auto pt-6 gap-3 shrink-0">
            <button onclick="prevQuestion()" ${state.currentIndex === 0 ? 'disabled' : ''} 
                    class="flex-1 py-3.5 px-4 rounded-xl font-extrabold flex items-center justify-center gap-2 transition-all ${state.currentIndex === 0 ? 'bg-slate-200 text-slate-400 cursor-not-allowed opacity-50' : 'bg-white border-2 border-blue-200 text-blue-700 hover:bg-blue-50 shadow-sm'}">
                <i class="fa-solid fa-chevron-left"></i> 이전
            </button>
            <button onclick="${isLast ? 'finishQuiz()' : 'nextQuestion()'}" ${!hasAnswered ? 'disabled' : ''} 
                    class="flex-1 py-3.5 px-4 rounded-xl font-extrabold flex items-center justify-center gap-2 transition-all ${!hasAnswered ? 'bg-slate-200 text-slate-400 cursor-not-allowed opacity-50' : 'bg-blue-600 text-white hover:bg-blue-700 shadow-md shadow-blue-600/20'}">
                ${isLast ? '결과 확인 <i class="fa-solid fa-flag-checkered"></i>' : '다음 <i class="fa-solid fa-chevron-right"></i>'}
            </button>
        </div>
    </div>
    `;
}

function getResultHTML() {
    // 푼 문제들 기준으로 정답/오답 판별 (동적 계산)
    const answeredQuestions = state.quizList.filter(q => q.userAnswer);
    const correctQuestions = answeredQuestions.filter(q => q.userAnswer === q.correctAnswer);
    const wrongQuestions = answeredQuestions.filter(q => q.userAnswer !== q.correctAnswer);

    // 전체 문제 수 대비 맞은 비율 (안 푼 문제가 있으면 0점 처리)
    const accuracy = Math.round((correctQuestions.length / state.quizList.length) * 100) || 0;
    
    let wrongHTML = '';
    if (wrongQuestions.length > 0) {
        const listHTML = wrongQuestions.map(item => `
            <div class="p-4 bg-slate-50 rounded-2xl mb-3 border border-slate-200">
                <div class="flex justify-between items-start mb-2">
                    <span class="font-extrabold text-lg text-slate-800">${item.en}</span>
                    <span class="text-[10px] font-bold px-2 py-1 bg-blue-100 text-blue-700 rounded-md">${item.ch}강 - ${item.ex.replace('Exercise ', 'Ex ')}</span>
                </div>
                <p class="text-slate-600 font-medium mb-3">${item.ko}</p>
                <div class="bg-red-100 text-red-700 p-2.5 rounded-xl text-sm flex gap-2 font-bold items-center">
                    <i class="fa-solid fa-xmark opacity-70"></i>
                    <span class="whitespace-nowrap opacity-70">나의 선택:</span> 
                    <span>${item.userAnswer}</span>
                </div>
            </div>
        `).join('');

        wrongHTML = `
        <div class="bg-white rounded-3xl shadow-sm p-5 mb-8 border border-red-200 mt-6 text-left relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1.5 h-full bg-red-400"></div>
            <h3 class="text-lg font-bold text-red-600 mb-5 flex items-center gap-2 pl-2">
                <i class="fa-solid fa-triangle-exclamation"></i> 오답 노트
            </h3>
            <div>
                ${listHTML}
            </div>
        </div>`;
    }

    return `
    <div class="flex-1 overflow-y-auto p-5 text-center bg-slate-50 custom-scrollbar h-full w-full">
        <div class="py-10 bg-white rounded-3xl shadow-sm border border-slate-200 mt-2 px-4">
            <div class="inline-flex items-center justify-center w-28 h-28 rounded-full bg-blue-50 text-blue-600 mb-6 shadow-inner border-4 border-blue-100 relative">
                <i class="fa-solid fa-ranking-star absolute -top-2 -right-2 text-3xl text-yellow-400 drop-shadow-md"></i>
                <span class="text-4xl font-black">${accuracy}<span class="text-xl text-blue-400 ml-1">%</span></span>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">수고하셨습니다!</h2>
            <p class="text-slate-500 font-medium mb-8">
                총 ${state.quizList.length}문제 중 <strong class="text-blue-600 text-xl mx-1">${correctQuestions.length}</strong>문제를 맞혔습니다.
            </p>

            <div class="flex flex-col gap-3">
                <button onclick="startQuiz()" class="w-full bg-white border-2 border-blue-500 text-blue-600 font-extrabold py-3.5 px-4 rounded-xl hover:bg-blue-50 transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-rotate-right"></i> 다시 풀기
                </button>
                <button onclick="goToHome()" class="w-full bg-blue-600 text-white font-extrabold py-3.5 px-4 rounded-xl hover:bg-blue-700 shadow-md shadow-blue-600/20 transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-house"></i> 설정으로 이동
                </button>
            </div>
        </div>
        ${wrongHTML}
    </div>
    `;
}

// --- 6. 초기화 및 렌더링 ---
function render() {
    const app = document.getElementById('app');
    if (state.view === 'home') app.innerHTML = getHomeHTML();
    else if (state.view === 'quiz') app.innerHTML = getQuizHTML();
    else if (state.view === 'result') app.innerHTML = getResultHTML();
}

window.addEventListener('DOMContentLoaded', () => {
    // 최초 실행 시 모든 범위 자동 선택
    state.selectedExercises = [...new Set(WORD_DATA.map(w => `${w.ch}-${w.ex}`))];
    loadSavedSession();
    render();
});
</script>

</body>
</html>
